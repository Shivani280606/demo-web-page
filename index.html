<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Landing Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
    }

    .hero {
      height: 100vh;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .hero-content h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .hero-content p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 30px;
      background: white;
      color: #0077ff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }

    .features {
      padding: 60px 20px;
      text-align: center;
      background: white;
    }

    .feature-box {
      margin: 20px auto;
      max-width: 300px;
    }

    footer {
      padding: 20px;
      text-align: center;
      background: #222;
      color: white;
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="hero-content">
      <h1>Build Your Dream Website</h1>
      <p>Create beautiful landing pages easily.</p>
      <a href="#" class="btn">Get Started</a>
    </div>
  </section>

  <section class="features">
    <h2>Features</h2>

    <div class="feature-box">
      <h3>Fast</h3>
      <p>Lightning-fast performance.</p>
    </div>

    <div class="feature-box">
      <h3>Responsive</h3>
      <p>Works on all devices.</p>
    </div>

    <div class="feature-box">
      <h3>Modern</h3>
      <p>Clean and modern design.</p>
    </div>
  </section>

  <footer>
    <p>© 2026 My Website</p>
  </footer>

</body>
</html>
